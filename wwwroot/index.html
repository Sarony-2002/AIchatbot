<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Platform Assistant</title>
<link rel="stylesheet" href="css/chat.css">
</head>
<body>
<div class="app">
<header>
  <div class="header-top">
    <div class="header-title">Platform Assistant</div>
    <div class="header-subtitle">How can I help you?</div>
  </div>
</header>
<div class="panel">
  <div class="welcome-card">
    <div class="welcome-title">Welcome! I'm your AI assistant.</div>
    <div class="welcome-text">You can ask me anything about the platform. For more accurate answers, you may choose one of the topics below, or simply type your question.</div>
  </div>
  <div class="topic-card">
    <div class="topic-label">Choose a topic (Optional)</div>
    <div class="topic-buttons">
      <button class="topic-button" data-topic="عن المركز والخدمات">About the Center &amp; Services</button>
      <button class="topic-button" data-topic="الطلبات والحسابات">Orders &amp; Accounts</button>
      <button class="topic-button" data-topic="الدعم الفني والتواصل">Technical Support</button>
    </div>
  </div>
</div>
<main id="messages">
<div class="bot">Hello! How can I help you today?</div>
</main>
<div class="faq-panel">
  <div class="faq-head">FAQs</div>
  <div id="faq-buttons" class="faq-buttons"></div>
</div>
<footer>
  <div class="footer-top">
    <button id="change-topic" class="secondary">Change Topic</button>
  </div>
  <div class="footer-input">
    <input id="message" placeholder="Ask me anything..." />
    <button id="send">Send</button>
  </div>
</footer>
</div>
<script src="js/chat.js"></script>
</body>
</html>
